<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>公众号链接替换工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f4;
    --bg3: #efefed;
    --text: #1a1a1a;
    --text2: #666660;
    --text3: #aaa9a3;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --border3: rgba(0,0,0,0.28);
    --success-bg: #eaf3de;
    --success-text: #3b6d11;
    --info-bg: #e6f1fb;
    --info-text: #185fa5;
    --danger-text: #a32d2d;
    --danger-border: rgba(163,45,45,0.3);
    --radius: 8px;
    --radius-lg: 12px;
    --font: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    --mono: 'SF Mono', 'Fira Code', 'Courier New', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252522;
      --bg3: #2e2e2b;
      --text: #e8e8e3;
      --text2: #9a9a93;
      --text3: #5a5a55;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --border3: rgba(255,255,255,0.28);
      --success-bg: #173404;
      --success-text: #c0dd97;
      --info-bg: #042c53;
      --info-text: #85b7eb;
      --danger-text: #f09595;
      --danger-border: rgba(240,149,149,0.3);
    }
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.6; }

  .layout { display: flex; height: 100vh; }

  .sidebar {
    width: 200px;
    flex-shrink: 0;
    border-right: 0.5px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    padding: 1.5rem 0;
  }

  .sidebar-logo {
    padding: 0 1.25rem 1.25rem;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 1rem;
  }
  .sidebar-logo span { font-size: 12px; font-weight: 400; color: var(--text3); display: block; margin-top: 2px; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 1.25rem;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    border-radius: 0;
    transition: background .12s;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--bg); color: var(--text); font-weight: 500; }
  .nav-item svg { opacity: .6; flex-shrink: 0; }
  .nav-item.active svg { opacity: 1; }

  .main { flex: 1; overflow-y: auto; padding: 2rem; max-width: 760px; }

  .page-title { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: .75rem;
  }

  .section { margin-bottom: 1.5rem; }
  .section-label { font-size: 12px; font-weight: 500; color: var(--text2); letter-spacing: .04em; text-transform: uppercase; margin-bottom: 8px; }

  .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 6px 14px;
    border-radius: 999px;
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    font-size: 13px;
    cursor: pointer;
    color: var(--text2);
    transition: all .12s;
    font-family: var(--font);
  }
  .chip:hover { border-color: var(--border3); color: var(--text); }
  .chip.active { background: var(--bg); border-color: var(--border3); color: var(--text); font-weight: 500; box-shadow: 0 0 0 1px var(--border3); }

  .link-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    margin-bottom: 6px;
    background: var(--bg);
    transition: border-color .12s;
  }
  .link-option:hover { border-color: var(--border2); }
  .link-option.active { border-color: var(--border3); background: var(--bg2); box-shadow: 0 0 0 1px var(--border3); }
  .dot { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; transition: all .12s; }
  .link-option.active .dot { background: var(--text); border-color: var(--text); }
  .link-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .link-alias { font-size: 12px; color: var(--text2); margin-top: 1px; }

  .confirm-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
  }
  .confirm-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; font-size: 13px; }
  .confirm-row:last-child { margin-bottom: 0; }
  .confirm-key { color: var(--text2); min-width: 56px; flex-shrink: 0; }
  .confirm-val { color: var(--text); font-weight: 500; word-break: break-all; }

  .output-block {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: .75rem 1rem;
    margin-bottom: .5rem;
  }
  .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .output-label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .output-text { font-family: var(--mono); font-size: 11.5px; line-height: 1.7; color: var(--text); white-space: pre-wrap; word-break: break-all; }

  button {
    font-family: var(--font);
    cursor: pointer;
    transition: all .12s;
  }
  .btn {
    padding: 8px 16px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
  }
  .btn:hover { background: var(--bg2); }
  .btn:active { transform: scale(.98); }
  .btn-primary {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    font-weight: 500;
    border-radius: var(--radius);
    border: 0.5px solid var(--border3);
    background: var(--bg);
    color: var(--text);
  }
  .btn-primary:hover { background: var(--bg2); }
  .btn-primary:disabled { opacity: .35; cursor: not-allowed; }
  .btn-copy { font-size: 12px; padding: 3px 10px; border-radius: var(--radius); background: none; border: 0.5px solid var(--border2); color: var(--text2); }
  .btn-copy:hover { background: var(--bg); }
  .btn-sm { font-size: 12px; padding: 4px 10px; border-radius: var(--radius); background: none; border: 0.5px solid var(--border2); color: var(--text2); }
  .btn-sm:hover { background: var(--bg2); }
  .btn-danger { color: var(--danger-text); border-color: var(--danger-border); }
  .btn-danger:hover { background: rgba(163,45,45,.06); }
  .btn-add { font-size: 12px; color: var(--info-text); background: none; border: none; padding: 4px 0; display: inline-flex; align-items: center; gap: 3px; margin-top: 6px; }
  .btn-add:hover { opacity: .7; }

  .field-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .field-row:last-child { margin-bottom: 0; }
  .field-label { font-size: 13px; color: var(--text2); min-width: 64px; flex-shrink: 0; }
  input[type=text], input[type=url], select, textarea {
    font-family: var(--font);
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 7px 10px;
    outline: none;
    width: 100%;
    transition: border-color .12s;
  }
  input[type=text]:focus, input[type=url]:focus, select:focus, textarea:focus { border-color: var(--border3); box-shadow: 0 0 0 2px rgba(0,0,0,.06); }
  select { cursor: pointer; }
  .inline-input {
    border: none;
    background: none;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    padding: 0;
    width: auto;
    flex: 1;
    outline: none;
  }
  .link-edit-block {
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    margin-bottom: 6px;
    background: var(--bg2);
  }
  .link-edit-block .field-row { margin-bottom: 6px; }

  .empty { font-size: 13px; color: var(--text3); padding: 2rem 0; text-align: center; }

  .top-bar { display: flex; justify-content: flex-end; margin-bottom: 1rem; }

  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; }
  .badge-ok { background: var(--success-bg); color: var(--success-text); }
  .badge-info { background: var(--info-bg); color: var(--info-text); }

  .divider { border: none; border-top: 0.5px solid var(--border); margin: 1rem 0; }

  .account-type-badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; margin-left: 6px; }
</style>
</head>
<body>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-logo">
      🔗 链接管理
      <span>公众号运营助手</span>
    </div>
    <button class="nav-item active" id="nav-operate" onclick="switchView('operate')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
      换链接
    </button>
    <button class="nav-item" id="nav-clients" onclick="switchView('clients')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      客户库
    </button>
    <button class="nav-item" id="nav-accounts" onclick="switchView('accounts')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      公众号库
    </button>
  </nav>

  <main class="main" id="main"></main>
</div>

<script>
const TEMPLATE_INTRO = '欢迎关注：【{name}】\n\n粉丝专享福利：内部精选！（必须添加客服才能领取福利）\n\n👉👉👉 ';
const TEMPLATE_SUFFIX = '>点击此处！领取精选股票池！</a>';

const defaultDb = {
  clients: [
    {
      id: 'c1', name: '智选主力',
      links: [
        { id: 'l1', innerName: '腾讯广告-A组', clientName: '智选-腾讯-001', url: 'https://work.weixin.qq.com/ca/cawcdebc5b6c9a1669?customer_channel=ADS_PR20260308151655902811' },
        { id: 'l2', innerName: '信息流-B组', clientName: '智选-信息流-002', url: '' }
      ]
    },
    {
      id: 'c2', name: '优策信号',
      links: [
        { id: 'l3', innerName: '主链接', clientName: '优策-main-001', url: '' }
      ]
    }
  ],
  accounts: [
    { id: 'a1', name: '智选风向', type: 'own', clientId: null, menu1: '每日资讯', menu2: '今日资讯' },
    { id: 'a2', name: '智选主力号', type: 'client', clientId: 'c1', menu1: '每日资讯', menu2: '今日资讯' }
  ],
  nextId: 200
};

let db = JSON.parse(JSON.stringify(defaultDb));
let currentView = 'operate';
let op = { accountId: null, clientId: null, linkId: null, generated: false };

function loadDb() {
  try {
    const s = localStorage.getItem('wx_link_db_v2');
    if (s) db = JSON.parse(s);
  } catch(e) {}
}
function saveDb() {
  try { localStorage.setItem('wx_link_db_v2', JSON.stringify(db)); } catch(e) {}
}
function uid() { return 'id' + (db.nextId++); }

loadDb();

function switchView(v) {
  currentView = v;
  op = { accountId: null, clientId: null, linkId: null, generated: false };
  ['operate','clients','accounts'].forEach(n => {
    document.getElementById('nav-'+n).classList.toggle('active', n === v);
  });
  render();
}

function render() {
  const main = document.getElementById('main');
  if (currentView === 'operate') main.innerHTML = renderOperate();
  else if (currentView === 'clients') main.innerHTML = renderClients();
  else main.innerHTML = renderAccounts();
}

function renderOperate() {
  const acc = db.accounts.find(a => a.id === op.accountId);
  let clientOptions = acc
    ? (acc.type === 'client' && acc.clientId ? db.clients.filter(c => c.id === acc.clientId) : db.clients)
    : [];
  const selClient = db.clients.find(c => c.id === op.clientId);
  const linkOptions = selClient ? selClient.links : [];
  const selLink = linkOptions.find(l => l.id === op.linkId);
  const effectiveClientId = acc && acc.type === 'client' ? acc.clientId : op.clientId;
  const effectiveClient = db.clients.find(c => c.id === effectiveClientId);

  let html = `<div class="page-title">换链接</div>`;

  html += `<div class="section">
    <div class="section-label">选公众号</div>
    <div class="chip-group">
      ${db.accounts.length === 0 ? '<span style="font-size:13px;color:var(--text3)">暂无公众号，请先到「公众号库」添加</span>' :
        db.accounts.map(a => {
          const badge = a.type === 'client' ? '客户号' : '自有号';
          return `<button class="chip ${op.accountId === a.id ? 'active' : ''}" onclick="selAccount('${a.id}')">${a.name} <span style="font-size:11px;opacity:.6">${badge}</span></button>`;
        }).join('')}
    </div>
  </div>`;

  if (acc && acc.type === 'own') {
    html += `<div class="section">
      <div class="section-label">选客户</div>
      <div class="chip-group">
        ${db.clients.length === 0 ? '<span style="font-size:13px;color:var(--text3)">暂无客户</span>' :
          db.clients.map(c => `<button class="chip ${op.clientId === c.id ? 'active' : ''}" onclick="selClient('${c.id}')">${c.name}</button>`).join('')}
      </div>
    </div>`;
  }

  if (acc && effectiveClientId) {
    const links = effectiveClient ? effectiveClient.links : [];
    html += `<div class="section">
      <div class="section-label">选链接</div>
      ${links.length === 0
        ? `<div class="empty">该客户暂无链接，请先到「客户库」添加</div>`
        : links.map(l => `
          <div class="link-option ${op.linkId === l.id ? 'active' : ''}" onclick="selLink('${l.id}')">
            <div class="dot"></div>
            <div>
              <div class="link-name">${esc(l.innerName)}</div>
              <div class="link-alias">客户叫：${esc(l.clientName) || '—'}</div>
              ${l.url ? '' : '<div class="link-alias" style="color:var(--danger-text)">⚠ URL未填写</div>'}
            </div>
          </div>`).join('')}
    </div>`;
  }

  if (acc && selLink) {
    html += `<div class="section">
      <div class="section-label">确认后生成</div>
      <div class="confirm-card">
        <div class="confirm-row"><span class="confirm-key">公众号</span><span class="confirm-val">${esc(acc.name)}</span></div>
        <div class="confirm-row"><span class="confirm-key">客户</span><span class="confirm-val">${effectiveClient ? esc(effectiveClient.name) : '—'}</span></div>
        <div class="confirm-row"><span class="confirm-key">内部名</span><span class="confirm-val">${esc(selLink.innerName)}</span></div>
        <div class="confirm-row"><span class="confirm-key">客户名</span><span class="confirm-val">${esc(selLink.clientName) || '—'}</span></div>
      </div>
      <button class="btn-primary" onclick="generate()" ${selLink.url ? '' : 'disabled'}>
        ${selLink.url ? '✓ 确认无误，生成替换内容' : 'URL为空，请先在客户库补充'}
      </button>
    </div>`;
  }

  if (op.generated && acc && selLink && selLink.url) {
    const url = selLink.url;
    const introLine = TEMPLATE_INTRO.replace('{name}', acc.name) + `<a href="${url}"` + TEMPLATE_SUFFIX;
    const autoReply = [introLine, introLine, introLine].join('\n');

    html += `<div class="section">
      <hr class="divider" />
      <div class="section-label" style="margin-bottom:12px">生成结果 — 分别复制粘贴到对应位置</div>
      ${buildOutputBlock('自动回复内容（3条）', 'out0', autoReply)}
      ${buildOutputBlock(`菜单「${esc(acc.menu1)}」链接`, 'out1', url)}
      ${buildOutputBlock(`菜单「${esc(acc.menu2)}」链接`, 'out2', url)}
    </div>`;
  }

  return html;
}

function buildOutputBlock(label, id, text) {
  return `<div class="output-block">
    <div class="output-header">
      <span class="output-label">${label}</span>
      <button class="btn-copy" id="btn-${id}" onclick="copyOut('${id}')">复制</button>
    </div>
    <div class="output-text" id="${id}">${esc(text)}</div>
  </div>`;
}

function renderClients() {
  let html = `<div class="page-title">客户库</div>
    <div class="top-bar"><button class="btn" onclick="addClient()">+ 添加客户</button></div>`;

  if (db.clients.length === 0) return html + `<div class="empty">暂无客户，点击右上角添加</div>`;

  db.clients.forEach(c => {
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <input class="inline-input" value="${esc(c.name)}" onblur="updClient('${c.id}','name',this.value)" placeholder="客户名称" />
        <button class="btn-sm btn-danger" onclick="delClient('${c.id}')">删除客户</button>
      </div>
      <div class="section-label">链接列表</div>
      ${c.links.map(l => `
        <div class="link-edit-block">
          <div class="field-row">
            <span class="field-label">内部叫法</span>
            <input type="text" value="${esc(l.innerName)}" onblur="updLink('${c.id}','${l.id}','innerName',this.value)" placeholder="你们内部的命名" />
            <button class="btn-sm btn-danger" onclick="delLink('${c.id}','${l.id}')" style="flex-shrink:0">×</button>
          </div>
          <div class="field-row">
            <span class="field-label">客户叫法</span>
            <input type="text" value="${esc(l.clientName)}" onblur="updLink('${c.id}','${l.id}','clientName',this.value)" placeholder="客户给这条链接的命名" />
          </div>
          <div class="field-row">
            <span class="field-label">链接 URL</span>
            <input type="url" value="${esc(l.url)}" onblur="updLink('${c.id}','${l.id}','url',this.value)" placeholder="https://..." style="font-family:var(--mono);font-size:12px" />
          </div>
        </div>`).join('')}
      <button class="btn-add" onclick="addLink('${c.id}')">+ 添加链接</button>
    </div>`;
  });
  return html;
}

function renderAccounts() {
  let html = `<div class="page-title">公众号库</div>
    <div class="top-bar"><button class="btn" onclick="addAccount()">+ 添加公众号</button></div>`;

  if (db.accounts.length === 0) return html + `<div class="empty">暂无公众号，点击右上角添加</div>`;

  db.accounts.forEach(a => {
    const boundClient = db.clients.find(c => c.id === a.clientId);
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <input class="inline-input" value="${esc(a.name)}" onblur="updAccount('${a.id}','name',this.value)" placeholder="公众号名称" />
        <button class="btn-sm btn-danger" onclick="delAccount('${a.id}')">删除</button>
      </div>
      <div class="field-row">
        <span class="field-label">号的类型</span>
        <select onchange="updAccount('${a.id}','type',this.value)">
          <option value="own" ${a.type==='own'?'selected':''}>自有号（可匹配多客户）</option>
          <option value="client" ${a.type==='client'?'selected':''}>客户号（锁定单一客户）</option>
        </select>
      </div>
      ${a.type === 'client' ? `<div class="field-row">
        <span class="field-label">绑定客户</span>
        <select onchange="updAccount('${a.id}','clientId',this.value)">
          <option value="">-- 请选择 --</option>
          ${db.clients.map(c => `<option value="${c.id}" ${a.clientId===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}
        </select>
      </div>` : ''}
      <div class="field-row">
        <span class="field-label">菜单1名称</span>
        <input type="text" value="${esc(a.menu1)}" onblur="updAccount('${a.id}','menu1',this.value)" placeholder="如：每日资讯" />
      </div>
      <div class="field-row">
        <span class="field-label">菜单2名称</span>
        <input type="text" value="${esc(a.menu2)}" onblur="updAccount('${a.id}','menu2',this.value)" placeholder="如：今日资讯" />
      </div>
    </div>`;
  });
  return html;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selAccount(id) {
  op = { accountId: id, clientId: null, linkId: null, generated: false };
  const acc = db.accounts.find(a => a.id === id);
  if (acc && acc.type === 'client') op.clientId = acc.clientId;
  render();
}
function selClient(id) { op.clientId = id; op.linkId = null; op.generated = false; render(); }
function selLink(id) { op.linkId = id; op.generated = false; render(); }
function generate() { op.generated = true; render(); }

function addClient() { db.clients.push({ id: uid(), name: '新客户', links: [] }); saveDb(); render(); }
function delClient(id) { if (!confirm('确认删除该客户及其所有链接？')) return; db.clients = db.clients.filter(c => c.id !== id); saveDb(); render(); }
function updClient(id, field, val) { const c = db.clients.find(x => x.id === id); if (c) c[field] = val; saveDb(); }

function addLink(cid) { const c = db.clients.find(x => x.id === cid); if (c) { c.links.push({ id: uid(), innerName: '新链接', clientName: '', url: '' }); saveDb(); render(); } }
function delLink(cid, lid) { const c = db.clients.find(x => x.id === cid); if (c) { c.links = c.links.filter(l => l.id !== lid); saveDb(); render(); } }
function updLink(cid, lid, field, val) { const c = db.clients.find(x => x.id === cid); if (c) { const l = c.links.find(x => x.id === lid); if (l) { l[field] = val; saveDb(); } } }

function addAccount() { db.accounts.push({ id: uid(), name: '新公众号', type: 'own', clientId: null, menu1: '每日资讯', menu2: '今日资讯' }); saveDb(); render(); }
function delAccount(id) { if (!confirm('确认删除该公众号？')) return; db.accounts = db.accounts.filter(a => a.id !== id); saveDb(); render(); }
function updAccount(id, field, val) { const a = db.accounts.find(x => x.id === id); if (a) { a[field] = val; if (field === 'type' && val === 'own') a.clientId = null; saveDb(); render(); } }

function copyOut(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = document.getElementById('btn-' + id);
    if (btn) { btn.textContent = '✓ 已复制'; setTimeout(() => btn.textContent = '复制', 1800); }
  });
}

render();
</script>
